<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Person You Are Now ❤️ — Birthday Website</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .present-scene {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 90px 24px 80px;
      text-align: center;
    }

    /* Slow zoom photo effect */
    .zoom-frame-wrap {
      position: relative;
      display: inline-block;
      margin: 32px 0 40px;
      border-radius: 50%;
      overflow: hidden;
    }
    .zoom-frame-ring {
      width: min(400px, 90vw);
      height: min(460px, 90vw);
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd700, #ff6b9d, #c084fc, #7c3aed, #ffd700);
      background-size: 300% 300%;
      animation: ringRotate 5s linear infinite;
      padding: 4px;
      box-shadow: 0 0 50px rgba(255,107,157,0.4), 0 0 100px rgba(192,132,252,0.25);
    }
    @keyframes ringRotate {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 200%; }
    }
    .zoom-frame-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(124,58,237,0.35), rgba(255,107,157,0.35));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
    }
    .zoom-frame-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      animation: slowZoom 10s ease-in-out infinite alternate;
    }
    @keyframes slowZoom {
      0%   { transform: scale(1); }
      100% { transform: scale(1.12); }
    }
    .frame-placeholder-ico { font-size: 3.5rem; opacity: 0.4; }
    .frame-placeholder-txt {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      text-align: center;
      padding: 0 12px;
    }

    /* Caption */
    .caption-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 520px;
      width: 100%;
      margin-bottom: 32px;
    }
    .caption-line {
      font-family: var(--ff-serif);
      font-size: clamp(1rem, 2.8vw, 1.3rem);
      font-style: italic;
      color: rgba(255,255,255,0.88);
      line-height: 1.8;
    }
    .caption-line.dim { color: rgba(255,255,255,0.62); }
    .caption-line.gold {
      color: var(--gold-soft);
      font-size: clamp(1.1rem, 3vw, 1.45rem);
      font-weight: 600;
    }

    /* Pulse ring decoration */
    .pulse-rings {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
      z-index: -1;
    }
    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,107,157,0.25);
      animation: pulseRing ease-out infinite;
    }
    @keyframes pulseRing {
      0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
      100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
    }

    .nebula-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 25% 75%, rgba(255,107,157,0.13) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 25%, rgba(124,58,237,0.14) 0%, transparent 55%);
      pointer-events: none;
    }
  </style>
</head>
