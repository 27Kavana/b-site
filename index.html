<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 20th Birthday ❤️</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── INDEX-SPECIFIC ── */
    .cover-scene {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 80px;
      text-align: center;
    }

    .sub-label {
      font-family: var(--ff-body);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 28px;
    }

    .typewriter-line {
      font-family: var(--ff-serif);
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      color: rgba(255,255,255,0.85);
      font-style: italic;
      min-height: 2.5rem;
      margin-bottom: 8px;
    }

    .typewriter-line-2 {
      font-family: var(--ff-serif);
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: rgba(255,255,255,0.7);
      font-style: italic;
      min-height: 2.2rem;
      margin-bottom: 40px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .main-title {
      font-family: var(--ff-display);
      font-size: clamp(2.2rem, 9vw, 7rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #ffd700 0%, #ff6b9d 35%, #c084fc 65%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,107,157,0.4));
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
      margin-bottom: 12px;
    }

    .heart-accent {
      font-size: clamp(1.5rem, 5vw, 3rem);
      display: block;
      margin: 8px 0 32px;
      opacity: 0;
      transition: opacity 0.8s ease;
      filter: drop-shadow(0 0 10px rgba(255,107,157,0.8));
    }

    .main-title.visible,
    .heart-accent.visible,
    .typewriter-line-2.visible {
      opacity: 1;
      transform: scale(1);
    }

    .date-reveal {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
      opacity: 0;
      transition: opacity 0.8s ease 0.6s;
    }
    .date-reveal.visible { opacity: 1; }

    /* Orbiting hearts around title */
    .orbit-ring {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }
    .orbit-heart {
      position: absolute;
      font-size: 1.2rem;
      animation: orbit linear infinite;
      transform-origin: 0 0;
    }
    @keyframes orbit {
      0%   { transform: rotate(0deg) translateX(var(--r)) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(var(--r)) rotate(-360deg); }
    }

    /* Moon decoration */
    .cover-moon {
      position: absolute;
      top: 8%;
      right: 10%;
      width: clamp(60px, 10vw, 100px);
      height: clamp(60px, 10vw, 100px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffde0, #f9c74f 60%, #e08a00);
      box-shadow: 0 0 40px rgba(249,199,79,0.7), 0 0 80px rgba(249,199,79,0.3);
      animation: moonGlow 4s ease-in-out infinite;
      z-index: 2;
    }

    /* Stars decoration */
    .deco-star {
      position: absolute;
      color: var(--gold-soft);
      animation: twinkleCSS 2s ease-in-out infinite;
      z-index: 2;
    }
    @keyframes twinkleCSS {
      0%,100% { opacity: 0.3; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.3); }
    }

    .btn-begin {
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .btn-begin.visible { opacity: 1; }

    /* Background nebula */
    .nebula-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 15% 85%, rgba(124,58,237,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(255,107,157,0.15) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(192,132,252,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="nightSky"></canvas>
  <div class="nebula-bg"></div>
  <div class="floating-hearts-container" id="floatingHearts"></div>

  <!-- Moon -->
  <div class="cover-moon"></div>

  <!-- Decorative stars -->
  <span class="deco-star" style="top:15%;left:8%;font-size:1.4rem;animation-delay:0.3s">⭐</span>
  <span class="deco-star" style="top:25%;left:20%;font-size:0.9rem;animation-delay:1s">✨</span>
  <span class="deco-star" style="top:60%;right:8%;font-size:1.2rem;animation-delay:0.6s">🌟</span>
  <span class="deco-star" style="top:75%;left:12%;font-size:0.8rem;animation-delay:1.5s">⭐</span>
  <span class="deco-star" style="top:40%;right:18%;font-size:1rem;animation-delay:0.9s">✨</span>
  <span class="deco-star" style="bottom:20%;right:15%;font-size:1.3rem;animation-delay:0.2s">💫</span>

  <!-- Music Player -->
  <div class="music-player">
    <button id="musicToggle">▶</button>
    <span id="musicLabel" class="music-note-anim">Music</span>
  </div>
  <audio id="bgMusic" loop>
    <source src="audio/background-music.mpeg" type="audio/mpeg" />
  </audio>

  <!-- Nav dots -->
  <nav class="nav-progress" aria-label="Page navigation">
    <a href="index.html" class="active" title="Cover"></a>
    <a href="childhood.html" title="Childhood"></a>
    <a href="present.html" title="Present"></a>
    <a href="story.html" title="Our Story"></a>
    <a href="dreamworld.html" title="Dream World"></a>
    <a href="giftbox.html" title="Gift Box"></a>
    <a href="letter.html" title="Letter"></a>
    <a href="reasons.html" title="Reasons"></a>
    <a href="future.html" title="Future"></a>
    <a href="secretheart.html" title="Secret Heart"></a>
    <a href="cake.html" title="Cake"></a>
    <a href="final.html" title="Final"></a>
  </nav>

  <!-- MAIN COVER CONTENT -->
  <main class="cover-scene">
    <p class="sub-label">✦ A surprise made with love ✦</p>

    <!-- Typewriter line 1 -->
    <p class="typewriter-line" id="typeLine1"></p>
    <!-- Typewriter line 2 (shown after) -->
    <p class="typewriter-line-2" id="typeLine2"></p>

    <!-- Main heading -->
    <div class="orbit-ring" id="orbitRing">
      <h1 class="main-title" id="mainTitle">
        HAPPY 20TH<br/>BIRTHDAY
      </h1>
    </div>
    <span class="heart-accent" id="heartAccent">❤️</span>

    <!-- Date badge -->
    <div class="date-reveal" id="dateBadge">
      <div class="date-badge">📅 24 June 2006 — The day my world changed ✨</div>
    </div>

    <!-- CTA button -->
    <a href="childhood.html" class="btn-romantic btn-begin" id="beginBtn">
      <span>Begin The Journey❤️</span>
    </a>
  </main>

  <script src="js/script.js"></script>
  <script>
    /* ── INDEX PAGE ANIMATIONS ── */
    document.addEventListener('DOMContentLoaded', () => {

      // Step 1: Typewriter line 1
      const line1 = document.getElementById('typeLine1');
      typeWriter(line1, ['Someone special was born on 24 June 2006 ❤️'], {
        speed: 60,
        pause: 1200,
        onDone: () => {
          // Keep it visible and show line2
          line1.textContent = 'Someone special was born on 24 June 2006 ❤️';
          const line2 = document.getElementById('typeLine2');
          line2.classList.add('visible');

          setTimeout(() => {
            typeWriter(line2, ['And somehow he became my favorite person in the world.'], {
              speed: 55,
              onDone: () => {
                // Reveal main title
                setTimeout(() => {
                  document.getElementById('mainTitle').classList.add('visible');
                  document.getElementById('heartAccent').classList.add('visible');
                  document.getElementById('dateBadge').classList.add('visible');
                  setTimeout(() => {
                    document.getElementById('beginBtn').classList.add('visible');
                    launchConfetti(3000);
                    addOrbitHearts();
                  }, 600);
                }, 400);
              }
            });
          }, 400);
        }
      });

      function addOrbitHearts() {
        const ring = document.getElementById('orbitRing');
        const ring2 = document.createElement('div');
        ring2.style.cssText = `
          position:absolute;inset:-60px;pointer-events:none;
        `;
        const hearts = ['❤️','💕','✨','💫','🌸'];
        hearts.forEach((h, i) => {
          const el = document.createElement('span');
          const angle = (i / hearts.length) * 360;
          el.style.cssText = `
            position:absolute;
            top:50%;left:50%;
            font-size:1.1rem;
            animation:orbit ${3 + i * 0.4}s linear infinite;
            animation-delay:${i * 0.3}s;
            --r:90px;
            transform-origin: 0 0;
            margin-left:-8px;margin-top:-8px;
          `;
          el.textContent = h;
          ring2.appendChild(el);
        });
        ring.style.position = 'relative';
        ring.appendChild(ring2);
      }
    });
  </script>
</body>
</html>
