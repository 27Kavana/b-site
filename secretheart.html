<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find My Heart ❤️ — Birthday Website</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .secret-scene {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 90px 24px 80px;
      text-align: center;
    }

    .nebula-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 30% 60%, rgba(255,107,157,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 40%, rgba(124,58,237,0.12) 0%, transparent 55%);
      pointer-events: none;
    }

    /* Instructions */
    .hunt-instruction {
      font-family: var(--ff-serif);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-style: italic;
      color: rgba(255,255,255,0.7);
      max-width: 460px;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    /* The hunt area */
    .hunt-area {
      position: relative;
      width: min(500px, 90vw);
      height: min(380px, 80vw);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      margin: 0 0 32px;
      overflow: hidden;
    }

    /* Decoy hearts — visible but wrong */
    .decoy-heart {
      position: absolute;
      font-size: 1.8rem;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
      opacity: 0.4;
    }
    .decoy-heart:hover {
      transform: scale(1.2);
      opacity: 0.6;
    }
    .decoy-heart:active { transform: scale(0.9); }

    /* The real hidden heart — tiny and sneaky */
    .real-heart {
      position: absolute;
      font-size: 1.1rem;
      cursor: pointer;
      opacity: 0.15;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 5;
    }
    .real-heart:hover {
      opacity: 0.4;
      transform: scale(1.3);
    }

    /* Wrong click shake */
    .shake-wrong {
      animation: wrongShake 0.4s ease;
    }
    @keyframes wrongShake {
      0%,100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg) scale(0.9); }
      75% { transform: rotate(8deg) scale(0.9); }
    }

    /* Hint counter */
    .hint-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hint-text {
      font-family: var(--ff-body);
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }
    .hint-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 6px 16px;
      font-family: var(--ff-body);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.2s;
    }
    .hint-btn:hover {
      background: rgba(255,107,157,0.15);
      border-color: rgba(255,107,157,0.3);
      color: var(--pink);
    }
    .hint-highlight {
      color: var(--gold-soft);
      font-weight: 600;
    }

    /* Celebration popup */
    .heart-popup {
      position: fixed;
      inset: 0;
      z-index: 9990;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
    }
    .heart-popup.show { display: flex; }
    .heart-popup-box {
      background: linear-gradient(160deg, rgba(124,58,237,0.5), rgba(255,107,157,0.4));
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,107,157,0.35);
      border-radius: 28px;
      padding: 44px 36px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      animation: popupBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes popupBounce {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }
    .popup-heart {
      font-size: 4rem;
      display: block;
      margin-bottom: 16px;
      animation: heartPulsePopup 1.2s ease-in-out infinite;
    }
    @keyframes heartPulsePopup {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.25); filter: drop-shadow(0 0 24px rgba(255,107,157,1)); }
    }
    .popup-text {
      font-family: var(--ff-display);
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      font-weight: 700;
      color: white;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .popup-sub {
      font-family: var(--ff-serif);
      font-size: 1rem;
      font-style: italic;
      color: rgba(255,255,255,0.75);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .popup-close {
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50px;
      padding: 8px 20px;
      color: rgba(255,255,255,0.6);
      font-family: var(--ff-body);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .popup-close:hover { border-color: rgba(255,255,255,0.5); color: white; }
  </style>
</head>
<body>
  <canvas id="nightSky"></canvas>
  <div class="nebula-bg"></div>
  <div class="floating-hearts-container" id="floatingHearts"></div>
  <div class="moon"></div>

  <div class="music-player">
    <button id="musicToggle">▶</button>
    <span id="musicLabel" class="music-note-anim">Music</span>
  </div>
  <audio id="bgMusic" loop>
    <source src="audio/background-music.mpeg" type="audio/mpeg" />
  </audio>

  <nav class="nav-progress" aria-label="Page navigation">
    <a href="index.html" title="Cover"></a>
    <a href="childhood.html" title="Childhood"></a>
    <a href="present.html" title="Present"></a>
    <a href="story.html" title="Our Story"></a>
    <a href="dreamworld.html" title="Dream World"></a>
    <a href="giftbox.html" title="Gift Box"></a>
    <a href="letter.html" title="Letter"></a>
    <a href="reasons.html" title="Reasons"></a>
    <a href="future.html" title="Future"></a>
    <a href="secretheart.html" class="active" title="Secret Heart"></a>
    <a href="cake.html" title="Cake"></a>
    <a href="final.html" title="Final"></a>
  </nav>

  <main class="secret-scene">
    <p style="font-family:var(--ff-body);font-size:0.72rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:20px" data-reveal>
      ✦ Chapter 9 — One final challenge ✦
    </p>
    <h2 class="heading-script" data-reveal>Find My Hidden Heart</h2>
    <p class="hunt-instruction" data-reveal>
      Somewhere in this field of hearts, I've hidden my real one.<br/>
      Find it if you can🥺❤️
    </p>

    <div class="hint-bar" data-reveal>
      <span class="hint-text">Clicks: <span id="clickCount" class="hint-highlight">0</span></span>
      <button class="hint-btn" onclick="showHint()">Hint 💡</button>
      <span class="hint-text" id="hintText"></span>
    </div>

    <!-- HUNT AREA -->
    <div class="hunt-area" id="huntArea" data-reveal>
      <!-- Populated by JS -->
    </div>

    <a href="cake.html" class="btn-romantic" id="cakeBtn" style="margin-top:20px" data-reveal>
      <span>Birthday Cake 🎂</span>
    </a>
  </main>

  <!-- FOUND POPUP -->
  <div class="heart-popup" id="heartPopup">
    <div class="heart-popup-box">
      <span class="popup-heart">❤️</span>
      <p class="popup-text">You found it! 🥺❤️</p>
      <p class="popup-sub">
        "I miss uuu mudduu 🥺❤️😘"<br/>
        Come soon and give me all your attention😁🤗😘❤️
      </p>
      <button class="popup-close" onclick="closePopup()">Close 🌸</button>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const area = document.getElementById('huntArea');
      const rects = area.getBoundingClientRect;
      let clicks = 0;
      let found = false;

      // Decoy hearts
      const decoyPositions = [
        {top:12,left:10},{top:8,left:40},{top:5,left:70},
        {top:20,left:20},{top:25,left:55},{top:18,left:80},
        {top:40,left:5},{top:45,left:30},{top:42,left:60},{top:38,left:85},
        {top:60,left:12},{top:65,left:45},{top:58,left:72},
        {top:75,left:8},{top:78,left:35},{top:72,left:65},{top:80,left:88},
      ];

      const decoyEmojis = ['🖤','💜','💙','💚','🧡','🩷','🤍','💛'];

      decoyPositions.forEach((pos, i) => {
        const el = document.createElement('div');
        el.className = 'decoy-heart';
        el.textContent = decoyEmojis[i % decoyEmojis.length];
        el.style.top  = pos.top + '%';
        el.style.left = pos.left + '%';
        el.addEventListener('click', () => {
          clicks++;
          document.getElementById('clickCount').textContent = clicks;
          el.classList.add('shake-wrong');
          setTimeout(() => el.classList.remove('shake-wrong'), 500);
        });
        area.appendChild(el);
      });

      // The real hidden heart — bottom-right corner, small and sneaky
      const realHeart = document.createElement('div');
      realHeart.className = 'real-heart';
      realHeart.textContent = '❤️';
      realHeart.style.top  = '82%';
      realHeart.style.right = '6%';
      realHeart.title = 'You found it!';
      realHeart.addEventListener('click', () => {
        if (found) return;
        found = true;
        launchConfetti(4000);
        document.getElementById('heartPopup').classList.add('show');
        initFloatingHearts('floatingHearts');
      });
      area.appendChild(realHeart);
    });

    function showHint() {
      const hints = [
        "It's smaller than the others... 👀",
        "Look towards the bottom... 🧐",
        "It's on the right side near the corner 🌸",
        "Bottom-right corner... ❤️",
      ];
      const count = parseInt(document.getElementById('clickCount').textContent);
      const idx = Math.min(Math.floor(count / 3), hints.length - 1);
      document.getElementById('hintText').textContent = hints[idx];
    }

    function closePopup() {
      document.getElementById('heartPopup').classList.remove('show');
    }
  </script>
</body>
</html>
