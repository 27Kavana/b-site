<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20 Reasons I Love You ❤️ — Birthday Website</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .reasons-scene {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 90px 24px 80px;
      text-align: center;
    }

    .nebula-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 30% 70%, rgba(255,107,157,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 30%, rgba(124,58,237,0.14) 0%, transparent 55%);
      pointer-events: none;
    }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      max-width: 760px;
      width: 100%;
      margin: 32px 0;
    }

    /* Flip card structure */
    .flip-card {
      width: 100%;
      aspect-ratio: 1;
      perspective: 800px;
      cursor: pointer;
    }
    .flip-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .flip-card.flipped .flip-inner {
      transform: rotateY(180deg);
    }
    .flip-front, .flip-back {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      gap: 8px;
    }
    .flip-front {
      background: linear-gradient(160deg, rgba(124,58,237,0.35), rgba(192,132,252,0.25));
      border: 1px solid rgba(192,132,252,0.25);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .flip-front-num {
      font-family: var(--ff-display);
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd700, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .flip-front-icon { font-size: 1.8rem; }
    .flip-front-tap {
      font-family: var(--ff-body);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    .flip-back {
      background: linear-gradient(160deg, rgba(255,107,157,0.3), rgba(196,69,105,0.25));
      border: 1px solid rgba(255,107,157,0.3);
      transform: rotateY(180deg);
      box-shadow: 0 4px 20px rgba(255,107,157,0.2);
    }
    .flip-back-text {
      font-family: var(--ff-serif);
      font-size: clamp(0.72rem, 1.8vw, 0.9rem);
      color: rgba(255,255,255,0.92);
      font-style: italic;
      line-height: 1.5;
      text-align: center;
    }

    /* Hover pulse */
    .flip-card:not(.flipped):hover .flip-inner {
      transform: rotateY(8deg) scale(1.04);
    }

    /* ── Final reveal ── */
    .final-reveal {
      max-width: 540px;
      width: 100%;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,107,157,0.2);
      border-radius: 24px;
      padding: 36px 28px;
      margin: 16px 0 32px;
      display: none;
      animation: revealFade 1s ease forwards;
    }
    .final-reveal.show { display: block; }
    @keyframes revealFade {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    .final-reveal p {
      font-family: var(--ff-serif);
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      font-style: italic;
      color: rgba(255,255,255,0.88);
      line-height: 1.9;
      margin-bottom: 10px;
    }
    .final-reveal .big-heart {
      font-size: 3rem;
      display: block;
      margin: 12px 0;
      animation: heartPulse 1.5s ease-in-out infinite;
    }
    @keyframes heartPulse {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(255,107,157,0.5)); }
      50%      { transform: scale(1.2); filter: drop-shadow(0 0 20px rgba(255,107,157,1)); }
    }

    /* Progress text */
    .flip-progress {
      font-family: var(--ff-body);
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .flip-progress span { color: var(--pink); font-weight: 600; }
  </style>
</head>
<body>
  <canvas id="nightSky"></canvas>
  <div class="nebula-bg"></div>
  <div class="floating-hearts-container" id="floatingHearts"></div>
  <div class="moon"></div>

  <div class="music-player">
    <button id="musicToggle">▶</button>
    <span id="musicLabel" class="music-note-anim">Music</span>
  </div>
  <audio id="bgMusic" loop>
    <source src="audio/background-music.mpeg" type="audio/mpeg" />
  </audio>

  <nav class="nav-progress" aria-label="Page navigation">
    <a href="index.html" title="Cover"></a>
    <a href="childhood.html" title="Childhood"></a>
    <a href="present.html" title="Present"></a>
    <a href="story.html" title="Our Story"></a>
    <a href="dreamworld.html" title="Dream World"></a>
    <a href="giftbox.html" title="Gift Box"></a>
    <a href="letter.html" title="Letter"></a>
    <a href="reasons.html" class="active" title="Reasons"></a>
    <a href="future.html" title="Future"></a>
    <a href="secretheart.html" title="Secret Heart"></a>
    <a href="cake.html" title="Cake"></a>
    <a href="final.html" title="Final"></a>
  </nav>

  <main class="reasons-scene">
    <p style="font-family:var(--ff-body);font-size:0.72rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:20px" data-reveal>
      ✦ Chapter 7 — All my reasons ✦
    </p>
    <h2 class="heading-script" data-reveal>20 Reasons I Love You</h2>
    <p class="text-romantic" data-reveal style="margin:12px 0 8px;max-width:480px">
      Tap each heart to reveal a reason 💕
    </p>

    <p class="flip-progress" id="flipProgress">
      <span id="flippedCount">0</span> / 20 hearts opened
    </p>

    <!-- CARDS GRID -->
    <div class="cards-grid" id="cardsGrid"></div>

    <!-- FINAL REVEAL (shown when all 20 flipped) -->
    <div class="final-reveal" id="finalReveal">
      <p>These were 20 reasons I love you😁🥰...</p>
      <p>But the truth is🤔...</p>
      <p style="color:var(--gold-soft);font-size:clamp(1.1rem,3vw,1.4rem);font-weight:600">"I don't need a reason to love you."</p>
      <span class="big-heart">❤️</span>
      <p style="color:var(--pink)">"I just do❤️🫂💓"</p>
    </div>

    <a href="future.html" class="btn-romantic" id="futureBtn" style="opacity:0;transition:opacity 1s ease">
      <span>Our Future ❤️</span>
    </a>
  </main>

  <script src="js/script.js"></script>
  <script>
    const reasons = [
      { num: 1,  icon: '⏰', text: 'Because you always make time for me.' },
      { num: 2,  icon: '💕', text: 'Because you make me feel loved every day.' },
      { num: 3,  icon: '🤍', text: 'Because your care feels genuine.' },
      { num: 4,  icon: '👂', text: 'Because you listen to me patiently.' },
      { num: 5,  icon: '🌙', text: 'Because you never make me feel alone.' },
      { num: 6,  icon: '💞', text: 'Because you understand my feelings.' },
      { num: 7,  icon: '📱', text: 'Because your messages make my day better.' },
      { num: 8,  icon: '🌟', text: 'Because you support me.' },
      { num: 9,  icon: '✨', text: 'Because you make ordinary moments special.' },
      { num: 10, icon: '🧠', text: 'Because you remember little things about me.' },
      { num: 11, icon: '😊', text: 'Because you make me smile.' },
      { num: 12, icon: '👑', text: 'Because you make me feel important.' },
      { num: 13, icon: '🙏', text: 'Because you respect me.' },
      { num: 14, icon: '💪', text: 'Because you stay through difficult moments.' },
      { num: 15, icon: '🕊️', text: 'Because your presence brings peace.' },
      { num: 16, icon: '💛', text: 'Because you are kind.' },
      { num: 17, icon: '🌍', text: 'Because distance never stops your care.' },
      { num: 18, icon: '🎯', text: 'Because you put effort into us.' },
      { num: 19, icon: '🌸', text: 'Because you entered my life unexpectedly and made it beautiful.' },
      { num: 20, icon: '❤️', text: 'Because you\'re simply YOU. ❤️' },
    ];

    let flipped = 0;
    const grid = document.getElementById('cardsGrid');

    reasons.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'flip-card';
      card.innerHTML = `
        <div class="flip-inner">
          <div class="flip-front">
            <div class="flip-front-num">${r.num}</div>
            <div class="flip-front-icon">${r.icon}</div>
            <div class="flip-front-tap">tap</div>
          </div>
          <div class="flip-back">
            <div class="flip-back-text">${r.text}</div>
          </div>
        </div>
      `;
      card.addEventListener('click', () => {
        if (!card.classList.contains('flipped')) {
          card.classList.add('flipped');
          flipped++;
          document.getElementById('flippedCount').textContent = flipped;
          if (flipped === 20) {
            setTimeout(() => {
              launchConfetti(4000);
              document.getElementById('finalReveal').classList.add('show');
              document.getElementById('futureBtn').style.opacity = '1';
            }, 600);
          }
        }
      });
      grid.appendChild(card);
    });
  </script>
</body>
</html>
